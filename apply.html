<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<body class="bg-gray-50 font-['JetBrains_Mono'] text-gray-900 antialiased min-h-screen flex flex-col justify-between selection:bg-[#F2A900]/30 selection:text-[#004165]">

    <nav class="bg-[#004165] text-white p-4 shadow-md sticky top-0 z-50 border-b-2 border-[#772432] w-full">

    <main class="max-w-2xl mx-auto py-12 px-6 my-auto w-full space-y-6">
        <div class="text-center space-y-2">

            <p class="text-xs text-gray-500">Please provide precise metrics below. Responses route automatically to the administrative sheet.</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-4 h-[600px] flex items-center justify-center">
            <div class="text-center space-y-3 p-6">
                <p class="text-xs text-gray-400 font-bold tracking-wider uppercase">// LIVE_FORM_CONTAINER_ACTIVE</p>
                <p class="text-xs text-gray-500 max-w-xs mx-auto">Your embedded registration engine goes here to funnel submissions safely to Google Sheets.</p>

        </div>

    <div class="pb-16"></div>
