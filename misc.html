<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miscellaneous Portal | LSC Toastmasters 2026</title>
    <!-- Tailwind CSS for unbreakable, modern layout margins -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Load JetBrains Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-['JetBrains_Mono'] text-gray-900 antialiased min-h-screen flex flex-col justify-between selection:bg-[#F2A900]/30 selection:text-[#004165]">

    <!-- Navigation Bar (Exactly identical to index.html) -->
    <nav class="bg-[#004165] text-white p-4 shadow-md sticky top-0 z-50 border-b-2 border-[#772432] w-full">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
            
            <div class="text-md font-bold tracking-wider text-[#F2A900]">
                LSC TOASTMASTERS 2026
            </div>
            
            <!-- Global Navigation Button linking to menu.html -->
            <a href="menu.html" class="bg-[#772432] text-white hover:bg-[#F2A900] hover:text-[#004165] font-bold px-4 py-2 rounded-xl shadow-sm transition text-xs uppercase tracking-wider select-none">
                &lt;NAVIGATION&gt;
            </a>

        </div>
    </nav>

    <!-- SECURITY CONTENT INNER BODY -->
    <main class="max-w-md mx-auto py-12 px-6 my-auto w-full">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-xl p-8 text-center space-y-6">
            <h1 class="text-xl font-bold tracking-wider text-[#004165] uppercase">
                // EXECUTIVE_GATEWAY
            </h1>
            <p id="gatewaySubtitle" class="text-xs text-gray-500">Select your authorization channel below.</p>

            <!-- Mode Selector Screen -->
            <div id="selectionMode" class="space-y-3">
                <button onclick="showInputField('invite')" class="w-full border border-gray-200 hover:border-[#004165] hover:text-[#004165] font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider bg-gray-50">
                    I have an invitation key
                </button>
                <button onclick="showInputField('dev')" class="w-full border border-gray-200 hover:border-[#772432] hover:text-[#772432] font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider bg-gray-50">
                    I have the dev key
                </button>
            </div>

            <!-- Input Form Box (Hidden by default) -->
            <div id="authBox" class="space-y-4 hidden">
                <input type="password" id="passcodeInput" placeholder="ENTER ASSIGNED KEY" 
                    class="w-full tracking-wider text-center font-bold border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 text-sm focus:outline-none focus:border-[#004165] focus:ring-1 focus:ring-[#004165]">
                
                <div class="flex space-x-2">
                    <button onclick="backToSelection()" class="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">
                        Back
                    </button>
                    <button onclick="verifyCredentials()" class="w-2/3 bg-[#004165] text-white hover:bg-[#772432] font-bold py-3 rounded-xl shadow-md transition text-xs uppercase tracking-wider">
                        Submit
                    </button>
                </div>
                <p id="errorMessage" class="text-xs text-red-600 font-bold hidden">❌ INVALID SECURE CREDENTIALS</p>
            </div>

            <!-- Panel A: Invitation Success (Google Sheets Access Only) -->
            <div id="inviteBox" class="hidden space-y-4">
                <div class="p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-800 text-xs font-bold">
                    🔓 INVITATION VERIFIED · READ access GRANTED
                </div>
                <a href="https://docs.google.com/spreadsheets/d/1gdmzlatHGzMhv9q3sz-tw-sF0u6fofhINSJphSsk2DY/edit?usp=sharing" target="_blank" 
                    class="block w-full text-center bg-[#F2A900] text-[#004165] hover:bg-[#004165] hover:text-white font-extrabold px-6 py-4 rounded-xl shadow-md transition text-xs tracking-wider uppercase">
                    Open Results Spreadsheet →
                </a>
            </div>

            <!-- Panel B: Developer Command Dashboard -->
            <div id="devBox" class="hidden space-y-4 text-left">
                <div class="p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-800 text-xs font-bold text-center">
                    ⚙️ ROOT DEVELOPER SYSTEM TERMINAL ACTIVE
                </div>
                
                <div class="space-y-2 pt-2">
                    <label class="text-[10px] font-bold text-gray-400 block tracking-widest uppercase">// CRITICAL_SYSTEM_CONTROLS</label>
                    
                    <button id="lockdownBtn" onclick="toggleLockdown()" 
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-extrabold py-3 rounded-xl shadow-md transition text-xs uppercase tracking-wider">
                        Trigger Emergency Lockdown
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="pb-16"></div>

    <script>
        let selectedMode = '';

        function showInputField(mode) {
            selectedMode = mode;
            document.getElementById('selectionMode').classList.add('hidden');
            document.getElementById('authBox').classList.remove('hidden');
            document.getElementById('passcodeInput').focus();
            document.getElementById('gatewaySubtitle').innerText = `Verifying ${mode.toUpperCase()} credentials:`;
        }

        function backToSelection() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('selectionMode').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('passcodeInput').value = '';
            document.getElementById('gatewaySubtitle').innerText = "Select your authorization channel below.";
        }

        function verifyCredentials() {
            const input = document.getElementById('passcodeInput').value;
            const errorMsg = document.getElementById('errorMessage');
            
            if (selectedMode === 'invite' && input === '123456') {
                errorMsg.classList.add('hidden');
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('inviteBox').classList.remove('hidden');
            } else if (selectedMode === 'dev' && input === 'toastdev112') {
                errorMsg.classList.add('hidden');
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('devBox').classList.remove('hidden');
                updateLockdownButtonUI();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        // Lockdown System Core Functionality
        function toggleLockdown() {
            const isLocked = localStorage.getItem('siteLockdown') === 'true';
            if (!isLocked) {
                // Activate lockdown
                localStorage.setItem('siteLockdown', 'true');
                alert("🔴 LOCKDOWN INITIATED: All form submissions stopped. Subpages are restricted to Home and Misc.");
            } else {
                // Lift lockdown
                localStorage.removeItem('siteLockdown');
                alert("🟢 LOCKDOWN LIFTED: Regular platform workflows restored.");
            }
            updateLockdownButtonUI();
        }

        function updateLockdownButtonUI() {
            const btn = document.getElementById('lockdownBtn');
            const isLocked = localStorage.getItem('siteLockdown') === 'true';
            if (isLocked) {
                btn.innerText = "LIFT SITE LOCKDOWN";
                btn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3 rounded-xl shadow-md transition text-xs uppercase tracking-wider";
            } else {
                btn.innerText = "TRIGGER EMERGENCY LOCKDOWN";
                btn.className = "w-full bg-red-600 hover:bg-red-700 text-white font-extrabold py-3 rounded-xl shadow-md transition text-xs uppercase tracking-wider";
            }
        }
    </script>
</body>
</html>
